name: Desplegar a Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Compilar y Subir
    runs-on: ubuntu-latest

    # --- NUEVO: ESTA LÍNEA EVITA EL AVISO NARANJA DE GITHUB ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🚚 Obtener el código de GitHub
        uses: actions/checkout@v4

      - name: ⚙️ Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Usamos una versión más estable y moderna

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🛠️ Compilar el proyecto (Vite)
        run: npm run build

      - name: 🚀 Subir archivos a Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          # --- MEJORA: EVITA EL ERROR DE TIMEOUT ---
          timeout: 120000
          # --- MEJORA: PROTEGE TUS ARCHIVOS DEL SERVIDOR ---
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            blog/**
            .htaccess
            robots.txt
            sitemap*.xml
